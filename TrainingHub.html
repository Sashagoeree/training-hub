<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans','Segoe UI',sans-serif;background:#f1f5f9;color:#111827;min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:225px;background:#0f172a;display:flex;flex-direction:column;padding:22px 14px;gap:2px;position:sticky;top:0;height:100vh;flex-shrink:0;overflow-y:auto}
.brand{padding-bottom:16px;border-bottom:1px solid #1e293b;margin-bottom:10px}
.brand h1{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.5px}
.brand p{font-size:11px;color:#64748b;margin-top:2px}
.nav-section{font-size:10px;font-weight:700;color:#334155;text-transform:uppercase;letter-spacing:1px;padding:9px 12px 3px}
.nav-btn{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:9px;border:none;cursor:pointer;background:transparent;color:#94a3b8;font-weight:600;font-size:13px;text-align:left;width:100%;font-family:inherit;transition:all .15s}
.nav-btn:hover{background:#1e293b;color:#e2e8f0}
.nav-btn.active{background:#1e40af;color:#fff}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.badge-red{margin-left:auto;background:#ef4444;color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;font-weight:700}
.sidebar-footer{margin-top:auto;padding:10px 12px;border-top:1px solid #1e293b;font-size:10px;color:#334155;text-align:center;line-height:1.6}
.main{flex:1;padding:24px 28px;overflow:auto;min-width:0}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.page-title{font-size:22px;font-weight:800;color:#0f172a}
.page-sub{font-size:12px;color:#64748b;margin-top:3px}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-input{border:1.5px solid #e2e8f0;border-radius:9px;padding:8px 13px;font-size:13px;outline:none;width:180px;background:#fff;font-family:inherit}
.btn-primary{background:#1e40af;color:#fff;border:none;border-radius:9px;padding:8px 15px;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit;white-space:nowrap}
.btn-primary:hover{background:#1d3996}
.btn-secondary{background:#f8fafc;color:#374151;border:1.5px solid #e2e8f0;border-radius:9px;padding:7px 12px;font-weight:600;cursor:pointer;font-size:12px;font-family:inherit}
.btn-secondary:hover{background:#e2e8f0}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.stat-card{background:#fff;border-radius:12px;padding:15px 17px;border:1px solid #e5e7eb;display:flex;gap:12px;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat-icon{border-radius:10px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.stat-value{font-size:22px;font-weight:800;line-height:1}
.stat-label{font-size:11px;color:#6b7280;margin-top:2px}
.stat-sub{font-size:10px;font-weight:600;margin-top:2px}
.budget-card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:18px 20px;margin-bottom:18px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.budget-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.budget-item{text-align:center;padding:13px;border-radius:10px}
.budget-val{font-size:22px;font-weight:800;line-height:1}
.budget-lbl{font-size:11px;color:#6b7280;margin-top:3px}
.budget-bar-wrap{background:#e5e7eb;border-radius:8px;height:5px;margin-top:11px;overflow:hidden}
.budget-bar{height:100%;border-radius:8px}
.badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.badge-dot{width:5px;height:5px;border-radius:50%;display:inline-block;flex-shrink:0}
.progress-wrap{background:#e5e7eb;border-radius:8px;height:6px;width:100%;overflow:hidden}
.progress-bar{height:100%;border-radius:8px}
.table-wrap{background:#fff;border-radius:12px;border:1px solid #e5e7eb;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
table{width:100%;border-collapse:collapse}
thead tr{background:#f8fafc;border-bottom:2px solid #e5e7eb}
th{padding:10px 13px;text-align:left;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
td{padding:11px 13px;border-bottom:1px solid #f3f4f6;vertical-align:middle;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.btn-sm{border:none;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;white-space:nowrap}
.btn-edit{background:#eff6ff;color:#1e40af}
.btn-del{background:#fef2f2;color:#dc2626}
.btn-green{background:#d1fae5;color:#065f46}
.btn-purple{background:#ede9fe;color:#5b21b6}
.empty{padding:34px;text-align:center;color:#9ca3af;font-size:13px}
.course-card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:17px 19px;display:flex;gap:15px;align-items:flex-start;margin-bottom:11px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.course-main{flex:1;min-width:0}
.course-name-row{display:flex;gap:7px;align-items:center;margin-bottom:3px;flex-wrap:wrap}
.course-name{font-weight:800;font-size:14px}

/* PARTICIPANT CARDS */
.participant-card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04);overflow:hidden}
.participant-header{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;cursor:default}
.participant-name{font-weight:800;font-size:14px;color:#0f172a}
.participant-meta{font-size:11px;color:#6b7280;margin-top:2px}
.tp-toggle{display:flex;align-items:center;gap:7px;background:#f8fafc;border:1.5px solid #e5e7eb;border-radius:8px;padding:5px 11px;cursor:pointer;font-size:12px;font-weight:600;color:#374151;font-family:inherit;transition:all .15s;white-space:nowrap}
.tp-toggle:hover{background:#eff6ff;border-color:#bfdbfe;color:#1e40af}
.tp-toggle.open{background:#eff6ff;border-color:#bfdbfe;color:#1e40af}
.tp-chevron{transition:transform .2s;font-size:10px}
.tp-chevron.open{transform:rotate(180deg)}
.training-plan-body{border-top:1px solid #f3f4f6;background:#fafafa;overflow:hidden;max-height:0;transition:max-height .3s ease}
.training-plan-body.open{max-height:1000px}
.training-plan-inner{padding:14px 18px}
.tp-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;margin-bottom:5px;font-size:12px}
.tp-done{background:#f0fdf4}
.tp-upcoming{background:#eff6ff}
.tp-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.cal-month{font-size:20px;font-weight:800;color:#0f172a}
.cal-nav{display:flex;gap:8px}
.cal-nav-btn{background:#fff;border:1.5px solid #e2e8f0;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:#374151}
.cal-nav-btn:hover{background:#f1f5f9}
.cal-grid{background:#fff;border-radius:12px;border:1px solid #e5e7eb;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.cal-day-headers{display:grid;grid-template-columns:repeat(7,1fr);background:#f8fafc;border-bottom:2px solid #e5e7eb}
.cal-day-header{padding:10px 0;text-align:center;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day{min-height:110px;border-right:1px solid #f3f4f6;border-bottom:1px solid #f3f4f6;padding:8px;vertical-align:top;position:relative}
.cal-day:nth-child(7n){border-right:none}
.cal-day.other-month{background:#fafafa}
.cal-day.other-month .cal-date{color:#d1d5db}
.cal-day.today{background:#eff6ff}
.cal-day.today .cal-date{background:#1e40af;color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.cal-date{font-size:13px;font-weight:700;color:#374151;margin-bottom:5px;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.cal-event{border-radius:5px;padding:3px 7px;margin-bottom:3px;font-size:11px;font-weight:600;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;transition:opacity .15s}
.cal-event:hover{opacity:.8}
.cal-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;font-size:12px;color:#6b7280}
.cal-legend-item{display:flex;align-items:center;gap:6px}
.cal-legend-dot{width:10px;height:10px;border-radius:3px}

/* ENROL */
.enrol-list{border:1.5px solid #e5e7eb;border-radius:9px;overflow:hidden;margin-bottom:12px;max-height:300px;overflow-y:auto}
.enrol-item{display:flex;align-items:center;gap:10px;padding:9px 13px;border-bottom:1px solid #f3f4f6;cursor:pointer;transition:background .1s}
.enrol-item:last-child{border-bottom:none}
.enrol-item:hover{background:#f8fafc}
.enrol-item.selected{background:#eff6ff}
.enrol-check{width:16px;height:16px;border-radius:4px;border:2px solid #d1d5db;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.enrol-check.on{background:#1e40af;border-color:#1e40af;color:#fff}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#fff;border-radius:16px;padding:24px;max-width:570px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:17px;font-weight:800}
.modal-close{background:#f3f4f6;border:none;border-radius:7px;width:29px;height:29px;cursor:pointer;font-size:14px;color:#6b7280;font-family:inherit}
.form-group{margin-bottom:12px}
.form-label{display:block;font-size:11px;font-weight:700;color:#374151;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.form-input,.form-select,.form-textarea{width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:8px 11px;font-size:13px;outline:none;background:#fafafa;font-family:inherit}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#1e40af}
.form-textarea{resize:vertical;min-height:58px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn-save{width:100%;background:#1e40af;color:#fff;border:none;border-radius:9px;padding:10px;font-weight:700;cursor:pointer;font-size:14px;font-family:inherit;margin-top:5px}
.checklist-builder{border:1.5px solid #e5e7eb;border-radius:9px;padding:11px;background:#fafafa;margin-bottom:12px}
.checklist-builder-title{font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px}
.cli-row{display:grid;grid-template-columns:1fr 120px 28px;gap:5px;margin-bottom:5px;align-items:center}
.cli-input{border:1.5px solid #e5e7eb;border-radius:7px;padding:6px 9px;font-size:12px;font-family:inherit;outline:none;background:#fff;width:100%}
.cli-input:focus{border-color:#1e40af}
.cli-remove{background:#fef2f2;color:#dc2626;border:none;border-radius:6px;padding:5px;cursor:pointer;font-family:inherit;width:100%;text-align:center;font-size:12px}

.chk-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid #f3f4f6}
.chk-row:last-child{border-bottom:none}
.chk{width:17px;height:17px;border-radius:5px;border:2px solid #d1d5db;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700}
.chk.done{background:#1e40af;border-color:#1e40af;color:#fff}
.pdf-upload-area{border:2px dashed #e2e8f0;border-radius:8px;padding:14px;text-align:center;cursor:pointer;background:#fafafa}
.pdf-upload-area:hover{border-color:#1e40af;background:#eff6ff}
.pdf-preview{background:#eff6ff;border-radius:7px;padding:9px 12px;display:flex;align-items:center;gap:9px;margin-top:7px}
.pdf-preview-name{font-size:12px;font-weight:600;color:#1e40af;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.dash-card{background:#fff;border-radius:12px;padding:18px;border:1px solid #e5e7eb;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.dash-card h3{margin:0 0 13px;font-size:14px;font-weight:700;color:#0f172a}
.app-row{margin-bottom:12px}
.app-row-header{display:flex;justify-content:space-between;margin-bottom:4px;align-items:center;gap:8px}
.req-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f3f4f6}
.req-row:last-child{border-bottom:none}
.req-badges{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.upcoming-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:9px}
.upcoming-card{border:1.5px solid #e5e7eb;border-radius:10px;padding:12px}
.span2{grid-column:span 2}
.export-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:12px}
.export-card{background:#fff;border-radius:12px;padding:18px;border:1px solid #e5e7eb}
.btn-download{width:100%;background:#1e40af;color:#fff;border:none;border-radius:9px;padding:9px;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit}
.toast{position:fixed;bottom:20px;right:20px;background:#0f172a;color:#fff;padding:9px 16px;border-radius:10px;font-weight:600;font-size:13px;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.2);opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.hidden{display:none}
</style>
</head>

function getTokenClient() {
  if (_tokenClient) return _tokenClient;
  _tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GD_CLIENT_ID,
    scope: GD_SCOPE,
    callback: async (resp) => {
      if (resp.error) { showToast('Google sign-in failed'); return; }
      gdToken = resp.access_token; gdConnected = true;
      localStorage.setItem('th5_gd_connected','1');
      await loadFromGoogleDrive();
      updateSyncUI(); render();
    }
  });
  return _tokenClient;
}

async function connectGoogleDrive() {
  if (!window.google) { showToast('Loading Google — try again in a moment'); return; }
  getTokenClient().requestAccessToken();
}

function disconnectGoogleDrive() {
  if (gdToken) google.accounts.oauth2.revoke(gdToken, ()=>{});
  gdToken=null; gdConnected=false; gdFileId=null;
  localStorage.removeItem('th5_gd_connected'); localStorage.removeItem('th5_gd_fileid');
  updateSyncUI(); render(); showToast('Disconnected from Google Drive');
}

async function silentReconnect() {
  if (!localStorage.getItem('th5_gd_connected')) return;
  if (!window.google) { setTimeout(silentReconnect, 800); return; }
  try { getTokenClient().requestAccessToken({ prompt:'' }); } catch(e) {}
}

async function loadFromGoogleDrive() {
  if (!gdToken) return;
  setSaveStatus('☁ Loading from Google Drive…');
  try {
    let fileId = gdFileId || localStorage.getItem('th5_gd_fileid');
    if (!fileId) {
      const list = await gdFetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D'${DATA_FILENAME}'&fields=files(id)`);
      fileId = list.files?.[0]?.id || null;
    }
    if (!fileId) { await saveToGoogleDrive(); return; }
    gdFileId = fileId; localStorage.setItem('th5_gd_fileid', fileId);
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers:{ Authorization:`Bearer ${gdToken}` } });
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    if (data.participants) participants = data.participants;
    if (data.apprentices)  apprentices  = data.apprentices;
    if (data.courses)      courses      = data.courses;
    if (data.requests)     requests     = data.requests;
    if (data.budget)       budget       = data.budget;
    if (data.claims)       claims       = data.claims;
    if (data.claimTypes)   claimTypes   = data.claimTypes;
    ['participants','apprentices','courses','requests','budget','claims','claimTypes'].forEach(k=>localStorage.setItem('th5_'+k,JSON.stringify(eval(k))));
    setSaveStatus('✓ Synced with Google Drive'); showToast('✓ Loaded from Google Drive');
  } catch(e) { setSaveStatus('⚠ Load failed — using local data'); }
}

async function saveToGoogleDrive() {
  if (!gdToken) return;
  setSaveStatus('☁ Saving to Google Drive…');
  const body = JSON.stringify({ participants, apprentices, courses, requests, budget, claims, claimTypes });
  try {
    if (gdFileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gdFileId}?uploadType=media`, { method:'PATCH', headers:{ Authorization:`Bearer ${gdToken}`,'Content-Type':'application/json' }, body });
    } else {
      const meta = await gdFetch('https://www.googleapis.com/drive/v3/files?fields=id', { method:'POST', body:JSON.stringify({ name:DATA_FILENAME, parents:['appDataFolder'] }) });
      gdFileId = meta.id; localStorage.setItem('th5_gd_fileid', gdFileId);
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gdFileId}?uploadType=media`, { method:'PATCH', headers:{ Authorization:`Bearer ${gdToken}`,'Content-Type':'application/json' }, body });
    }
    setSaveStatus('✓ Saved to Google Drive');
  } catch(e) { setSaveStatus('⚠ Save failed — saved locally'); }
}

async function gdFetch(url, opts={}) {
  const res = await fetch(url, { ...opts, headers:{ Authorization:`Bearer ${gdToken}`,'Content-Type':'application/json',...(opts.headers||{}) } });
  return res.json();
}

function updateSyncUI() {
  const el = document.getElementById('sync-btn'); if (!el) return;
  if (gdConnected) {
    el.innerHTML = `<div style="background:#d1fae5;border-radius:8px;padding:8px 10px;margin-top:4px"><div style="font-size:11px;font-weight:700;color:#065f46">☁ Google Drive Connected</div><div style="font-size:10px;color:#065f46;margin-top:1px">Auto-saving all changes</div><button onclick="disconnectGoogleDrive()" style="margin-top:6px;width:100%;background:#fff;border:1px solid #6ee7b7;border-radius:6px;padding:4px;font-size:11px;font-weight:600;color:#065f46;cursor:pointer;font-family:inherit">Disconnect</button></div>`;
  } else {
    el.innerHTML = `<button onclick="connectGoogleDrive()" style="width:100%;background:#1e40af;color:#fff;border:none;border-radius:8px;padding:9px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;line-height:1.5;margin-top:4px">☁ Connect Google Drive<br><span style="font-size:10px;font-weight:400;opacity:.85">Auto-save & sync data</span></button>`;
  }
}

function ld(k){try{const v=localStorage.getItem('th5_'+k);return v?JSON.parse(v):JSON.parse(JSON.stringify(DEFAULTS[k]));}catch{return JSON.parse(JSON.stringify(DEFAULTS[k]));}}
function sd(k,d){try{localStorage.setItem('th5_'+k,JSON.stringify(d));}catch(e){}}

let participants=ld('participants'),apprentices=ld('apprentices'),courses=ld('courses'),requests=ld('requests'),budget=ld('budget'),claims=ld('claims'),claimTypes=ld('claimTypes');
let currentTab='dashboard',searchVal='',editId=null,modalMode=null;
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
let openPlans=new Set();

const SC={"On Track":{bg:"#d1fae5",text:"#065f46",dot:"#10b981"},"At Risk":{bg:"#fee2e2",text:"#991b1b",dot:"#ef4444"},"Completed":{bg:"#dbeafe",text:"#1e40af",dot:"#3b82f6"},"Scheduled":{bg:"#fef9c3",text:"#854d0e",dot:"#eab308"},"Full":{bg:"#ede9fe",text:"#5b21b6",dot:"#8b5cf6"},"Approved":{bg:"#d1fae5",text:"#065f46",dot:"#10b981"},"Pending":{bg:"#fef9c3",text:"#854d0e",dot:"#eab308"},"Under Review":{bg:"#e0e7ff",text:"#3730a3",dot:"#6366f1"},"Declined":{bg:"#fee2e2",text:"#991b1b",dot:"#ef4444"},"Did Not Attend":{bg:"#fef2f2",text:"#991b1b",dot:"#dc2626"},"High":{bg:"#fee2e2",text:"#991b1b",dot:"#ef4444"},"Medium":{bg:"#fef9c3",text:"#854d0e",dot:"#eab308"},"Low":{bg:"#d1fae5",text:"#065f46",dot:"#10b981"}};
function bdg(l){const c=SC[l]||{bg:"#f3f4f6",text:"#374151",dot:"#9ca3af"};return `<span class="badge" style="background:${c.bg};color:${c.text}"><span class="badge-dot" style="background:${c.dot}"></span>${l}</span>`;}
function pb(v){const col=v>=75?'#10b981':v>=40?'#f59e0b':'#ef4444';return `<div class="progress-wrap"><div class="progress-bar" style="width:${v}%;background:${col}"></div></div>`;}
function getProgress(a){if(!a.courses||!a.courses.length)return 0;return Math.round(a.courses.filter(c=>c.done).length/a.courses.length*100);}
function daysLeft(d){if(!d)return 9999;return Math.ceil((new Date(d)-new Date())/86400000);}
function getStatus(a){const p=getProgress(a),d=daysLeft(a.endDate);if(p===100)return 'Completed';if(d<=180&&p<75)return 'At Risk';return 'On Track';}
function getCommitted(){return courses.filter(c=>c.status==='Scheduled'||c.status==='Full').reduce((s,c)=>s+(parseInt(c.cost)||0),0);}
function getPName(id){const p=participants.find(x=>x.id===id);return p?p.name:'';}
function getPNames(ids){return(ids||[]).map(getPName).filter(Boolean).join(', ');}
function getTrainingPlan(pid){
  const plan=[];
  courses.forEach(c=>{if((c.participantIds||[]).includes(pid)){const hasCert=c.certificates&&c.certificates[pid];const isDNA=c.dnaMap&&c.dnaMap[pid];const dnaReason=isDNA?c.dnaMap[pid].reason:'';plan.push({name:c.name,date:c.date,status:isDNA?'Did Not Attend':c.status==='Completed'?'Completed':new Date(c.date)<new Date()?'Completed':'Upcoming',type:'Short Course',provider:c.provider,cert:hasCert?true:false,dnaReason});}});
  const app=apprentices.find(a=>{const p=participants.find(x=>x.id===pid);return p&&a.email&&p.email&&a.email.toLowerCase()===p.email.toLowerCase();});
  if(app&&app.courses){app.courses.forEach(cu=>{plan.push({name:cu.name,date:cu.date||'',status:cu.done?'Completed':'Booked',type:'Apprentice Unit',provider:app.qualification});});}
  return plan;
}

// ── CALENDAR HELPERS ──────────────────────────────────────────────────────────
function getCalEvents(){
  const events=[];
  const COLORS=[
    {bg:'#dbeafe',text:'#1e40af',border:'#93c5fd'},
    {bg:'#d1fae5',text:'#065f46',border:'#6ee7b7'},
    {bg:'#ede9fe',text:'#5b21b6',border:'#c4b5fd'},
    {bg:'#fff7ed',text:'#c2410c',border:'#fdba74'},
    {bg:'#fce7f3',text:'#9d174d',border:'#f9a8d4'},
    {bg:'#f0fdf4',text:'#166534',border:'#86efac'},
  ];
  courses.forEach((c,i)=>{
    if(!c.date)return;
    const col=COLORS[i%COLORS.length];
    events.push({date:c.date,label:c.name,sub:c.provider,type:'course',color:col,status:c.status,people:(c.participantIds||[]).length});
  });
  apprentices.forEach(a=>{
    (a.courses||[]).forEach((cu,i)=>{
      if(!cu.date||cu.done)return;
      const col={bg:'#fef9c3',text:'#854d0e',border:'#fde68a'};
      events.push({date:cu.date,label:cu.name,sub:a.name,type:'unit',color:col});
    });
  });
  return events;
}

const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAY_NAMES=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function renderCalendar(){
  const today=new Date();
  const firstDay=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0);
  // Get Monday-based start
  let startDow=firstDay.getDay();
  startDow=startDow===0?6:startDow-1;
  const events=getCalEvents();

  function eventsForDate(y,m,d){
    const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    return events.filter(e=>e.date===dateStr);
  }

  const days=[];
  // Prev month padding
  for(let i=startDow-1;i>=0;i--){
    const d=new Date(calYear,calMonth,1-i-1);
    days.push({date:d,current:false});
  }
  // Current month
  for(let d=1;d<=lastDay.getDate();d++){
    days.push({date:new Date(calYear,calMonth,d),current:true});
  }
  // Next month padding
  const remaining=7-days.length%7;
  if(remaining<7){for(let d=1;d<=remaining;d++){days.push({date:new Date(calYear,calMonth+1,d),current:false});}}

  const cells=days.map(({date,current})=>{
    const y=date.getFullYear(),m=date.getMonth(),d=date.getDate();
    const isToday=y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate();
    const dayEvents=eventsForDate(y,m,d);
    const evHtml=dayEvents.slice(0,3).map(e=>`<div class="cal-event" style="background:${e.color.bg};color:${e.color.text};border-left:3px solid ${e.color.border}" title="${e.label}${e.sub?' — '+e.sub:''}">${e.label}</div>`).join('');
    const more=dayEvents.length>3?`<div style="font-size:10px;color:#6b7280;padding:1px 4px">+${dayEvents.length-3} more</div>`:'';
    return `<div class="cal-day${!current?' other-month':''}${isToday?' today':''}">
      <div class="cal-date">${d}</div>
      ${evHtml}${more}
    </div>`;
  }).join('');

  return `
    <div class="cal-header">
      <div class="cal-month">${MONTH_NAMES[calMonth]} ${calYear}</div>
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calPrev()">← Prev</button>
        <button class="cal-nav-btn" onclick="calToday()">Today</button>
        <button class="cal-nav-btn" onclick="calNext()">Next →</button>
      </div>
    </div>
    <div class="cal-grid">
      <div class="cal-day-headers">${DAY_NAMES.map(d=>`<div class="cal-day-header">${d}</div>`).join('')}</div>
      <div class="cal-days">${cells}</div>
    </div>
    <div class="cal-legend">
      <span style="font-weight:600;color:#374151">Legend:</span>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#dbeafe;border:2px solid #93c5fd"></div>Short Courses</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#fef9c3;border:2px solid #fde68a"></div>Apprentice Units</div>
    </div>`;
}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}render();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}render();}
function calToday(){calYear=new Date().getFullYear();calMonth=new Date().getMonth();render();}

  if(currentTab==='apprentices')addBtn=`<button class="btn-primary" onclick="openModal('add-apprentice')">+ Add Apprentice</button>`;
  if(currentTab==='courses')addBtn=`<button class="btn-primary" onclick="openModal('add-course')">+ Add Course</button>`;
  if(currentTab==='completed')addBtn='';
  if(currentTab==='claims')addBtn=`<button class="btn-primary" onclick="openModal('add-claim')">+ Add Claim</button>`;
  if(currentTab==='requests')addBtn=`<button class="btn-primary" onclick="openModal('add-request')">+ New Request</button>`;
  if(currentTab!=='dashboard'&&currentTab!=='export'&&currentTab!=='calendar')sb=`<input class="search-input" placeholder="Search…" value="${searchVal}" oninput="searchVal=this.value;render()"/>`;

  let content='';

  // ── DASHBOARD ──────────────────────────────────────────────────────────────
  if(currentTab==='dashboard'){
    const atRisk=apprentices.filter(a=>getStatus(a)==='At Risk').length;
    const active=courses.filter(c=>c.status!=='Completed').length;
    const pend=requests.filter(r=>r.status==='Pending'||r.status==='Under Review').length;
    const committed=getCommitted();
    const proj=budget.projected||0,barPct=proj>0?Math.min(100,Math.round(committed/proj*100)):0,variance=proj-committed;
    const closedCostBusiness=claims.filter(c=>c.status==='Closed').reduce((s,c)=>s+(parseFloat(c.costIncurred)||0),0);
    const cards=[
      {icon:'👥',label:'Participants',value:participants.length,sub:'In directory',color:'#0891b2'},
      {icon:'🎓',label:'Apprentices',value:apprentices.length,sub:`${atRisk} at risk`,color:'#1e40af'},
      {icon:'📋',label:'Active Courses',value:active,sub:'Scheduled / Full',color:'#8b5cf6'},
      {icon:'📨',label:'Pending',value:pend,sub:'Awaiting review',color:'#f59e0b'},
      {icon:'💰',label:'Cost to Business',value:`$${closedCostBusiness.toLocaleString()}`,sub:`${claims.filter(c=>c.status==='Closed').length} closed claims`,color:'#059669'},
    ].map(s=>`<div class="stat-card"><div class="stat-icon" style="background:${s.color}18">${s.icon}</div><div><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div><div class="stat-sub" style="color:${s.color}">${s.sub}</div></div></div>`).join('');
    const atRiskBanner=atRisk>0?`<div class="alert-banner">⚠️ <strong>${apprentices.filter(a=>getStatus(a)==='At Risk').map(a=>a.name).join(', ')}</strong> — under 75% with less than 6 months remaining.</div>`:'';
    content=`<div class="stats-grid">${cards}</div>${atRiskBanner}

        <div class="budget-grid">
          <div class="budget-item" style="background:#eff6ff"><div class="budget-val" style="color:#1e40af">$${(budget.projected||0).toLocaleString()}</div><div class="budget-lbl">Projected</div><div style="font-size:10px;color:#6b7280;margin-top:2px">Manually set</div></div>
          <div class="budget-item" style="background:#fef9c3"><div class="budget-val" style="color:#854d0e">$${(budget.expected||0).toLocaleString()}</div><div class="budget-lbl">Expected Spend</div><div style="font-size:10px;color:#6b7280;margin-top:2px">Manually set</div></div>
          <div class="budget-item" style="background:#d1fae5"><div class="budget-val" style="color:#065f46">$${committed.toLocaleString()}</div><div class="budget-lbl">Committed</div><div style="font-size:10px;color:#6b7280;margin-top:2px">From booked courses</div></div>
        </div>
        <div style="margin-top:11px">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:#6b7280;margin-bottom:3px"><span>Committed vs Projected</span><span>${barPct}%</span></div>
          <div class="budget-bar-wrap"><div class="budget-bar" style="width:${barPct}%;background:${barPct>90?'#ef4444':barPct>70?'#f59e0b':'#10b981'}"></div></div>

        </div>
      </div>
      <div class="dash-grid">
        <div class="dash-card span2"><h3>Upcoming Courses</h3>${courses.filter(c=>c.status!=='Completed').length===0?'<div style="color:#9ca3af;font-size:13px">No upcoming courses</div>':`<div class="upcoming-grid">${courses.filter(c=>c.status!=='Completed').map(c=>`<div class="upcoming-card"><div style="font-weight:700;font-size:13px;margin-bottom:2px">${c.name}</div><div style="font-size:11px;color:#6b7280;margin-bottom:5px">${c.provider} · ${c.date}</div><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:11px">${(c.participantIds||[]).length} enrolled</span>${bdg(c.status)}</div></div>`).join('')}</div>`}</div>
        <div class="dash-card"><h3>Apprentice Progress</h3>${apprentices.length===0?'<div style="color:#9ca3af;font-size:13px">No apprentices yet</div>':apprentices.map(a=>{const p=getProgress(a),s=getStatus(a),d=daysLeft(a.endDate);return `<div class="app-row"><div class="app-row-header"><div><div style="font-weight:700;font-size:13px">${a.name}</div><div style="font-size:10px;color:#6b7280">${a.qualification||''}</div></div><div style="display:flex;align-items:center;gap:5px"><span style="font-weight:800;font-size:12px">${p}%</span>${bdg(s)}</div></div>${pb(p)}<div style="font-size:10px;color:#6b7280;margin-top:2px">${a.courses?a.courses.filter(c=>c.done).length+'/'+a.courses.length+' units':''} · ${d>0?d+'d left':'Overdue'}</div></div>`;}).join('')}</div>
        <div class="dash-card"><h3>Recent Requests</h3>${requests.length===0?'<div style="color:#9ca3af;font-size:13px">No requests</div>':requests.slice(0,6).map(r=>`<div class="req-row"><div><div style="font-weight:700;font-size:13px">${r.employee}</div><div style="font-size:10px;color:#6b7280">${r.course}</div></div><div class="req-badges">${bdg(r.status)}${bdg(r.priority)}</div></div>`).join('')}</div>
      </div>`;
  }

  // ── CALENDAR ───────────────────────────────────────────────────────────────
  if(currentTab==='calendar'){content=renderCalendar();}

  // ── PARTICIPANTS ───────────────────────────────────────────────────────────
  if(currentTab==='participants'){
    const fil=participants.filter(p=>p.name?.toLowerCase().includes(q)||p.department?.toLowerCase().includes(q)||p.email?.toLowerCase().includes(q));
    if(fil.length===0){content=`<div class="table-wrap"><div class="empty">No participants found. Click + Add Person to get started.</div></div>`;}
    else{
      content=fil.map(p=>{
        const plan=getTrainingPlan(p.id);
        const done=plan.filter(x=>x.status==='Completed');
        const upcoming=plan.filter(x=>x.status!=='Completed');
        const isOpen=openPlans.has(p.id);

    const flatC=courses.map(c=>({Name:c.name,Provider:c.provider,Date:c.date,Seats:c.seats,Enrolled:(c.participantIds||[]).length,Cost:c.cost,Status:c.status,Participants:getPNames(c.participantIds),InvoiceNo:c.invoiceNo||'',InvoiceNotes:c.invoiceNotes||''}));

        {icon:'💰',label:'Claims',desc:'All claims with amounts and status',data:claims.map(c=>({Title:c.title,ClaimType:c.claimType,EmployerClaimID:c.employerClaimId,Participant:c.participantName,InvoiceNo:c.invoiceNo,CreatedOn:c.createdOn,ClaimAmount:c.claimAmount,AcceptedAmount:c.acceptedAmount,CostIncurred:c.costIncurred})),file:'claims.csv'},

function renderCourseCard(c, isCompleted) {
  const names = getPNames(c.participantIds);
  const dnaParticipants = (c.dnaList||[]);
  const certCount = Object.keys(c.certificates||{}).length;
  return `
    <div class="course-card" style="${isCompleted&&c.status==='Did Not Attend'?'border-left:3px solid #ef4444':''}">
      <div class="course-main">
        <div class="course-name-row"><span class="course-name">${c.name}</span>${bdg(c.status)}</div>
        <div style="font-size:12px;color:#6b7280;margin-bottom:4px">${c.provider} · ${c.date}</div>
        ${names?`<div style="font-size:12px;color:#374151;margin-bottom:4px">👥 ${names}</div>`:'<div style="font-size:11px;color:#d1d5db;margin-bottom:4px">No participants enrolled</div>'}
        ${Object.keys(c.dnaMap||{}).length>0?`<div style="font-size:12px;background:#fef2f2;border-radius:6px;padding:5px 9px;color:#991b1b;margin-bottom:4px">❌ ${Object.keys(c.dnaMap||{}).length} did not attend</div>`:''}
        ${c.courseNotes?`<div style="font-size:12px;color:#6b7280;font-style:italic;margin-bottom:4px">📝 ${c.courseNotes}</div>`:''}
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          ${c.invoiceNo?`<span style="font-size:11px;font-weight:600;color:#6366f1">🧾 ${c.invoiceNo}${c.invoiceNotes?' — '+c.invoiceNotes:''}</span>`:`<span style="font-size:11px;color:#d1d5db">No invoice</span>`}
          ${c.invoicePdfName?`<button class="btn-sm btn-purple" onclick="viewPdf(${c.id})">📄 ${c.invoicePdfName}</button>`:''}
          ${certCount>0?`<span style="font-size:11px;font-weight:600;color:#065f46">🏆 ${certCount} certificate${certCount>1?'s':''}</span>`:''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:9px;flex-shrink:0">
        <div style="display:flex;gap:14px">
          <div style="text-align:center"><div style="font-size:16px;font-weight:800">${(c.participantIds||[]).length}/${c.seats}</div><div style="font-size:10px;color:#6b7280">Seats</div></div>
          <div style="text-align:center"><div style="font-size:16px;font-weight:800">$${parseInt(c.cost||0).toLocaleString()}</div><div style="font-size:10px;color:#6b7280">Cost</div></div>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end">
          ${!isCompleted?`<button class="btn-sm btn-green" onclick="openModal('enrol-course',${c.id})">👥 Enrol</button>`:''}
          ${(c.participantIds||[]).length>0&&!isCompleted?`<button class="btn-sm btn-green" onclick="sendCourseEmail(${c.id})">📧 Email</button>`:''}
          ${(c.participantIds||[]).length>0&&!isCompleted?`<button class="btn-sm" style="background:#fff7ed;color:#c2410c" onclick="sendReminderEmail(${c.id})">🔔 Remind</button>`:''}
          ${isCompleted?`<button class="btn-sm btn-green" onclick="openModal('manage-certs',${c.id})">📁 Documents</button>`:''}
          <button class="btn-sm btn-edit" onclick="openModal('edit-course',${c.id})">Edit</button>
          <button class="btn-sm btn-del" onclick="deleteCourse(${c.id})">Del</button>
        </div>
      </div>
    </div>`;
}

function sendReminderEmail(courseId){
  const c=courses.find(x=>x.id===courseId);if(!c)return;
  const emails=(c.participantIds||[]).map(id=>{const p=participants.find(x=>x.id===id);return p&&p.email?p.email:null;}).filter(Boolean);
  const subject=encodeURIComponent(`Training Reminder: ${c.name} — ${c.date}`);
  const notesLine=c.courseNotes?`\n\nImportant Information:\n${c.courseNotes}`:'';
  const body=encodeURIComponent(`Hi,\n\nThis is a friendly reminder that you are booked in for the following training:\n\nCourse: ${c.name}\nProvider: ${c.provider}\nDate: ${c.date}${notesLine}\n\nPlease confirm your attendance and let us know if you have any questions.\n\nKind regards,\nTraining Team`);
  window.location.href=`mailto:${emails.join(';')}?subject=${subject}&body=${body}`;
  showToast('Opening email client…');
}

function exportTrainingPlan(pid){
  const p=participants.find(x=>x.id===pid);if(!p)return;
  const plan=getTrainingPlan(pid);
  const done=plan.filter(x=>x.status==='Completed');
  const upcoming=plan.filter(x=>x.status!=='Completed'&&x.status!=='Did Not Attend');
  const dna=plan.filter(x=>x.status==='Did Not Attend');
  const rows=plan.map(x=>{
    const isDNA=x.status==='Did Not Attend';
    const isComp=x.status==='Completed';
    const bg=isDNA?'#fff8f8':isComp?'#f0fdf4':'#eff6ff';
    const statusBadge=isDNA?'<span style="background:#fef2f2;color:#991b1b;border-radius:10px;padding:2px 8px;font-size:11px;font-weight:600">Did Not Attend</span>':isComp?'<span style="background:#d1fae5;color:#065f46;border-radius:10px;padding:2px 8px;font-size:11px;font-weight:600">✓ Completed</span>':'<span style="background:#dbeafe;color:#1e40af;border-radius:10px;padding:2px 8px;font-size:11px;font-weight:600">Upcoming</span>';
    return `<tr style="background:${bg}"><td style="padding:10px 14px;border-bottom:1px solid #e5e7eb;font-weight:600">${x.name}</td><td style="padding:10px 14px;border-bottom:1px solid #e5e7eb;color:#6b7280">${x.type}</td><td style="padding:10px 14px;border-bottom:1px solid #e5e7eb;color:#6b7280">${x.provider||''}</td><td style="padding:10px 14px;border-bottom:1px solid #e5e7eb;color:#6b7280">${x.date||'—'}</td><td style="padding:10px 14px;border-bottom:1px solid #e5e7eb">${statusBadge}</td>${x.cert?'<td style="padding:10px 14px;border-bottom:1px solid #e5e7eb">🏆</td>':'<td style="padding:10px 14px;border-bottom:1px solid #e5e7eb;color:#d1d5db">—</td>'}</tr>`;
  }).join('');
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Training Plan — ${p.name}</title>

function exportCSV(data,filename){if(!data.length)return;const keys=Object.keys(data[0]);const csv=[keys.join(','),...data.map(row=>keys.map(k=>`"${String(row[k]??'').replace(/"/g,'""')}"`).join(','))].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=filename;a.click();}

function sendCourseEmail(courseId){
  const c=courses.find(x=>x.id===courseId);if(!c)return;
  const emails=(c.participantIds||[]).map(id=>{const p=participants.find(x=>x.id===id);return p&&p.email?p.email:null;}).filter(Boolean);
  const subject=encodeURIComponent(`Training Confirmation: ${c.name} — ${c.date}`);
  const notesLine=c.courseNotes?`\n\nAdditional Information:\n${c.courseNotes}`:'';
  const body=encodeURIComponent(`Hi,\n\nThis is to confirm your enrolment in the following training:\n\nCourse: ${c.name}\nProvider: ${c.provider}\nDate: ${c.date}${notesLine}\n\nPlease arrive on time and bring any required ID or materials.\n\nIf you have any questions please reach out.\n\nKind regards,\nTraining Team`);
  if(!emails.length){showToast('⚠ No email addresses on enrolled participants');return;}
  window.location.href=`mailto:${emails.join(';')}?subject=${subject}&body=${body}`;showToast('Opening email client…');
}

function viewPdf(courseId){const c=courses.find(x=>x.id===courseId);if(!c||!c.invoicePdf)return;const win=window.open();win.document.write(`<iframe src="${c.invoicePdf}" style="width:100%;height:100vh;border:none"></iframe>`);}

      <div style="border:1.5px solid #e5e7eb;border-radius:9px;padding:12px;margin-bottom:12px">
        <div style="font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px">💬 Notes</div>
        <div id="claim-note-log" style="max-height:160px;overflow-y:auto;margin-bottom:8px">${noteLog}</div>
        <div style="display:flex;gap:8px">
          <textarea class="form-textarea" id="new-claim-note" placeholder="Add a note…" style="min-height:40px;flex:1;margin-bottom:0"></textarea>
          <button onclick="addClaimNote()" style="background:#1e40af;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-weight:700;cursor:pointer;font-size:12px;font-family:inherit;align-self:flex-end">Add</button>
        </div>
      </div>
      <button class="btn-save" id="claim-submit-btn" onclick="submitClaim()">${mode==='add-claim'?'Add Claim':'Save Changes'}</button>`;
    window._claimPdf=d.invoicePdf||null;window._claimPdfName=d.invoicePdfName||null;window._claimSoa=d.soaPdf||null;window._claimSoaName=d.soaPdfName||null;window._claimDisplayId=displayId;window._claimData=d;
  }

  // ── MANAGE CLAIM TYPES ────────────────────────────────────────────────────
  if(mode==='manage-claim-types'){
    title.textContent='⚙ Manage Claim Types';
    const renderList=()=>(claimTypes||[]).map((t,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f3f4f6"><span style="flex:1;font-size:13px">${t}</span><button class="btn-sm btn-del" onclick="removeClaimType(${i})">Remove</button></div>`).join('');
    body.innerHTML=`<div id="ct-list">${renderList()}</div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <input class="form-input" id="new-ct-input" placeholder="New claim type…" style="flex:1">
        <button onclick="addClaimType()" style="background:#1e40af;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit">Add</button>
      </div>
      <button class="btn-save" style="margin-top:12px" onclick="closeModal()">Done</button>`;
  }

  document.getElementById('modal').classList.remove('hidden');
}

function removeClaimPdf(){window._claimPdf=null;window._claimPdfName=null;const p=document.querySelector('#claim-pdf-drop~.pdf-preview,.pdf-preview:not(#soa-preview)');if(p)p.remove();document.getElementById('claim-pdf-drop').style.display='';}
function updateClaimStatusFields(status, claimAmount){
  const extra=document.getElementById('claim-extra-fields');if(!extra)return;
  const show=['Approved','Rejected','Resubmitted','Closed'].includes(status);
  extra.style.display=show?'':'none';
  if(!show)return;
  const isApproved=status==='Approved'||status==='Closed';
  const isRejected=status==='Rejected';
  const isResubmitted=status==='Resubmitted';
  const amt=parseFloat(claimAmount)||0;
  const ed=window._claimData||{}; // existing data for pre-population
  extra.innerHTML=isApproved?`
    <div style="background:#f0fdf4;border-radius:8px;padding:13px;margin-bottom:12px;border:1px solid #bbf7d0">
      <div style="font-size:11px;font-weight:700;color:#065f46;text-transform:uppercase;letter-spacing:.3px;margin-bottom:10px">✅ Approval Details</div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Accepted Amount ($)</label>
          <input class="form-input" name="acceptedAmount" id="accepted-amt" type="number" value="${ed.acceptedAmount||''}" placeholder="0" oninput="calcCostToBusiness(${amt})">
        </div>
        <div class="form-group"><label class="form-label">Cost to Business ($) <span style="font-size:10px;color:#6b7280;font-weight:400">(claim − accepted)</span></label>
          <input class="form-input" name="costIncurred" id="cost-business" type="number" value="${ed.costIncurred||''}" placeholder="Auto-calculated" readonly style="background:#f1f5f9;color:#374151">
        </div>
      </div>
      <div class="form-group"><label class="form-label">Approved On</label><input class="form-input" name="statusDate" type="date" value="${ed.statusDate||new Date().toISOString().slice(0,10)}"></div>
      <div style="font-size:11px;color:#065f46;margin-top:4px">💡 Saving will close this claim as <strong>Closed</strong></div>
    </div>`
  :isRejected?`
    <div style="background:#fef2f2;border-radius:8px;padding:13px;margin-bottom:12px;border:1px solid #fecaca">
      <div style="font-size:11px;font-weight:700;color:#dc2626;text-transform:uppercase;letter-spacing:.3px;margin-bottom:10px">❌ Rejection Details</div>
      <div class="form-group"><label class="form-label">Rejection Reason</label><textarea class="form-textarea" name="rejectionReason" placeholder="Why was this claim rejected?">${ed.rejectionReason||''}</textarea></div>
      <div class="form-group"><label class="form-label">Rejected On</label><input class="form-input" name="statusDate" type="date" value="${ed.statusDate||new Date().toISOString().slice(0,10)}"></div>
      <div class="form-group"><label class="form-label">Next Steps</label>
        <select class="form-select" name="nextAction" onchange="updateNextAction(this.value)">
          <option value="">— Select next steps —</option>
          <option value="Resubmit" ${ed.nextAction==='Resubmit'?'selected':''}>Resubmit Claim</option>
          <option value="Write Off" ${ed.nextAction==='Write Off'?'selected':''}>Write Off (close out)</option>
        </select>
      </div>
      <div id="resubmit-info" style="${ed.nextAction==='Resubmit'?'':'display:none'}">
        <div style="background:#ede9fe;border-radius:7px;padding:10px;margin-bottom:8px">
          <div style="font-size:12px;font-weight:700;color:#5b21b6;margin-bottom:3px">🔄 Will move to Resubmitted</div>
          <div style="font-size:12px;color:#5b21b6">Full history is copied across. Status becomes <strong>Resubmitted</strong>.</div>
        </div>
      </div>
      <div id="final-decision-info" style="${ed.nextAction==='Write Off'?'':'display:none'}">
        <div style="background:#f3f4f6;border-radius:7px;padding:10px;margin-bottom:8px">
          <div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:6px">🔒 Write Off</div>
          <div style="font-size:11px;color:#6b7280">Claim will be <strong>Closed</strong>. Full claim amount becomes cost to business.</div>
        </div>
      </div>
    </div>`
  :`
    <div style="background:#ede9fe;border-radius:8px;padding:13px;margin-bottom:12px;border:1px solid #ddd6fe">
      <div style="font-size:11px;font-weight:700;color:#5b21b6;text-transform:uppercase;letter-spacing:.3px;margin-bottom:10px">🔄 Resubmission Details</div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Accepted Amount ($)</label>
          <input class="form-input" name="acceptedAmount" id="accepted-amt" type="number" placeholder="0" oninput="calcCostToBusiness(${amt})">
        </div>
        <div class="form-group"><label class="form-label">Cost to Business ($)</label>
          <input class="form-input" name="costIncurred" id="cost-business" type="number" placeholder="Auto-calculated" readonly style="background:#f1f5f9">
        </div>
      </div>
      <div class="form-group"><label class="form-label">Resubmitted On</label><input class="form-input" name="statusDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
    </div>`;
}
function calcCostToBusiness(claimAmtFallback){
  const claimAmt=parseFloat(document.querySelector('[name="claimAmount"]')?.value||0)||parseFloat(claimAmtFallback||0);
  const acceptedAmt=parseFloat(document.getElementById('accepted-amt')?.value||0);
  const costField=document.getElementById('cost-business');
  if(costField) costField.value=Math.max(0,claimAmt-acceptedAmt).toFixed(2);
}
function updateNextAction(val){
  document.getElementById('resubmit-info').style.display=val==='Resubmit'?'':'none';
  document.getElementById('final-decision-info').style.display=val==='Final Decision'?'':'none';
}
function addClaimNote(){
  const text=document.getElementById('new-claim-note')?.value?.trim();if(!text)return;
  const status=document.getElementById('claim-status-sel')?.value||'Pending';
  // Store note in a temp array on window until save
  if(!window._claimNotes)window._claimNotes=[];
  window._claimNotes.push({text,author:'Admin',date:new Date().toLocaleDateString('en-AU'),status});
  document.getElementById('new-claim-note').value='';
  const log=document.getElementById('claim-note-log');
  if(log){
    const div=document.createElement('div');
    div.style.cssText='background:#f8fafc;border-radius:7px;padding:8px 10px;margin-bottom:6px';
    div.innerHTML=`<div style="font-size:11px;font-weight:700;color:#374151">Admin <span style="color:#9ca3af;font-weight:400">${new Date().toLocaleDateString('en-AU')}</span> <span style="font-size:10px;background:#e0e7ff;color:#3730a3;border-radius:8px;padding:1px 6px">${status}</span></div><div style="font-size:12px;color:#374151;margin-top:2px">${text}</div>`;
    log.appendChild(div);log.scrollTop=log.scrollHeight;

}
function addClaimType(){
  const v=document.getElementById('new-ct-input')?.value?.trim();if(!v)return;
  if(!claimTypes.includes(v)){claimTypes.push(v);persist('claimTypes',claimTypes);}
  document.getElementById('ct-list').innerHTML=(claimTypes||[]).map((t,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f3f4f6"><span style="flex:1;font-size:13px">${t}</span><button class="btn-sm btn-del" onclick="removeClaimType(${i})">Remove</button></div>`).join('');
  document.getElementById('new-ct-input').value='';
}
function removeClaimType(i){
  claimTypes.splice(i,1);persist('claimTypes',claimTypes);
  document.getElementById('ct-list').innerHTML=(claimTypes||[]).map((t,j)=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f3f4f6"><span style="flex:1;font-size:13px">${t}</span><button class="btn-sm btn-del" onclick="removeClaimType(${j})">Remove</button></div>`).join('');
}
function submitClaim(){
  const maxNum=claims.reduce((mx,c)=>{const n=parseInt((c.internalClaimId||'').replace('CLM-',''))||0;return Math.max(mx,n)},0);
  const displayId=window._claimDisplayId||'CLM-'+String(maxNum+1).padStart(4,'0');
  const d=getForm();
  // Read readonly fields that getForm() skips
  const costBusinessEl=document.getElementById('cost-business');
  if(costBusinessEl&&costBusinessEl.value) d.costIncurred=costBusinessEl.value;
  d.invoicePdf=window._claimPdf;d.invoicePdfName=window._claimPdfName;
  d.soaPdf=window._claimSoa;d.soaPdfName=window._claimSoaName;
  const today=new Date().toLocaleDateString('en-AU');
  const newNotes=window._claimNotes||[];

  // ── Status transition logic ──
  const nextAction=d.nextAction||'';

  // Approved → auto-close, calc cost to business = claimed - accepted
  if(d.status==='Approved'){
    const claimed=parseFloat(d.claimAmount||0);
    const accepted=parseFloat(d.acceptedAmount||0);
    d.costIncurred=(claimed-accepted).toFixed(2);
    d.status='Closed';
    d.closedDate=today;
    newNotes.push({text:`✅ Claim approved. Approved amount: $${accepted.toLocaleString()}. Cost to business: $${d.costIncurred}`,author:'System',date:today,status:'Closed'});
  }

  // Rejected + Resubmit → copy history, move to Resubmitted
  if(d.status==='Rejected'&&nextAction==='Resubmit'){
    d.status='Resubmitted';
    d.resubmittedDate=today;
    d.costIncurred=0;
    newNotes.push({text:`🔄 Resubmitted after rejection. Rejection reason: ${d.rejectionReason||'Not specified'}`,author:'System',date:today,status:'Resubmitted'});
  }

  // Rejected + Write Off → close, full claim = cost to business
  if(d.status==='Rejected'&&nextAction==='Write Off'){
    d.status='Closed';
    d.closedDate=today;
    d.costIncurred=d.claimAmount;
    d.acceptedAmount=0;
    newNotes.push({text:`🔒 Written off. Full claim amount ($${parseFloat(d.claimAmount||0).toLocaleString()}) recorded as cost to business.`,author:'System',date:today,status:'Closed'});
  }

  // Resubmitted → log updated date
  if(d.status==='Resubmitted'){
    d.lastUpdated=today;
  }

  if(modalMode==='add-claim'){
    claims.push({...d,id:Date.now(),internalClaimId:displayId,notes:newNotes,createdDate:today});
  } else {
    const existing=claims.find(c=>c.id===editId)||{};
    const mergedNotes=[...(existing.notes||[]),...newNotes];
    claims=claims.map(c=>c.id!==editId?c:{...existing,...d,
      internalClaimId:c.internalClaimId,
      createdDate:c.createdDate,
      invoicePdf:window._claimPdf,invoicePdfName:window._claimPdfName,
      soaPdf:window._claimSoa,soaPdfName:window._claimSoaName,
      notes:mergedNotes
    });
  }
  window._claimNotes=null;window._pendingStatus=null;
  persist('claims',claims);closeModal();render();
}
function deleteClaim(id){if(!confirm('Delete this claim?'))return;claims=claims.filter(c=>c.id!==id);persist('claims',claims);render();}
function viewClaimPdf(id){const c=claims.find(x=>x.id===id);if(!c||!c.invoicePdf)return;const win=window.open();win.document.write(`<iframe src="${c.invoicePdf}" style="width:100%;height:100vh;border:none"></iframe>`);}
function viewClaimSoa(id){const c=claims.find(x=>x.id===id);if(!c||!c.soaPdf)return;const win=window.open();win.document.write(`<iframe src="${c.soaPdf}" style="width:100%;height:100vh;border:none"></iframe>`);}

function addUnit(){const w=document.getElementById('cli-wrap');const d=document.createElement('div');d.className='cli-row';d.innerHTML=`<input class="cli-input" placeholder="Unit name"/><input class="cli-input" type="date"/><button class="cli-remove" onclick="this.parentElement.remove()">✕</button>`;w.appendChild(d);}
function getUnits(){return Array.from(document.querySelectorAll('#cli-wrap .cli-row')).map(row=>{const ins=row.querySelectorAll('input');const name=(ins[0]?.value||'').trim();return name?{name,date:ins[1]?.value||'',done:false}:null;}).filter(Boolean);}
function toggleCourse(aid,idx){const a=apprentices.find(x=>x.id===aid);if(!a||!a.courses)return;a.courses[idx].done=!a.courses[idx].done;persist('apprentices',apprentices);openModal('view-apprentice',aid);}
function handlePdfUpload(event){const file=event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{window._tempPdf=e.target.result;window._tempPdfName=file.name;document.getElementById('pdf-drop').style.display='none';const prev=document.createElement('div');prev.className='pdf-preview';prev.innerHTML=`<span style="font-size:16px">📄</span><span class="pdf-preview-name">${file.name}</span><button class="btn-sm btn-del" onclick="removePdf()">Remove</button>`;document.getElementById('pdf-drop').parentNode.insertBefore(prev,document.getElementById('pdf-drop'));};reader.readAsDataURL(file);}
function removePdf(){window._tempPdf=null;window._tempPdfName=null;const prev=document.querySelector('.pdf-preview');if(prev)prev.remove();document.getElementById('pdf-drop').style.display='';}
function toggleEnrol(pid,cid){const c=courses.find(x=>x.id===cid);if(!c)return;if(!c.participantIds)c.participantIds=[];const idx=c.participantIds.indexOf(pid);if(idx>=0)c.participantIds.splice(idx,1);else c.participantIds.push(pid);const isOn=c.participantIds.includes(pid);document.getElementById('enrol-'+pid)?.classList.toggle('selected',isOn);const chk=document.getElementById('echk-'+pid);if(chk){chk.classList.toggle('on',isOn);chk.textContent=isOn?'✓':'';}}
function saveEnrolment(cid){const c=courses.find(x=>x.id===cid);if(!c)return;c.enrolled=(c.participantIds||[]).length;persist('courses',courses);closeModal();render();}
function submitParticipant(){const d=getForm();if(modalMode==='add-participant')participants.push({...d,id:Date.now()});else participants=participants.map(p=>p.id===editId?{...p,...d}:p);persist('participants',participants);closeModal();render();}
function deleteParticipant(id){if(!confirm('Delete this person?'))return;participants=participants.filter(p=>p.id!==id);persist('participants',participants);render();}
function submitApprentice(){const d=getForm(),units=getUnits();if(modalMode==='add-apprentice'){apprentices.push({...d,id:Date.now(),courses:units});}else{apprentices=apprentices.map(a=>{if(a.id!==editId)return a;const ex=a.courses||[];return{...a,...d,courses:units.map(u=>{const e=ex.find(c=>c.name===u.name);return e?{...e,date:u.date}:u;})};});}persist('apprentices',apprentices);closeModal();render();}
function deleteApprentice(id){if(!confirm('Delete this apprentice?'))return;apprentices=apprentices.filter(a=>a.id!==id);persist('apprentices',apprentices);render();}
function submitCourse(){const d=getForm();d.seats=parseInt(d.seats)||0;d.cost=parseInt(d.cost)||0;if(modalMode==='add-course'){d.participantIds=[];d.enrolled=0;d.certificates={};d.dnaMap={};d.invoiceNo='';d.invoiceNotes='';d.invoicePdf=null;d.invoicePdfName=null;courses.push({...d,id:Date.now()});}else{courses=courses.map(c=>c.id!==editId?c:{...c,...d,invoiceNo:c.invoiceNo,invoiceNotes:c.invoiceNotes,invoicePdf:c.invoicePdf,invoicePdfName:c.invoicePdfName,certificates:c.certificates||{},dnaMap:c.dnaMap||{}});}persist('courses',courses);closeModal();render();}
function deleteCourse(id){if(!confirm('Delete this course?'))return;courses=courses.filter(c=>c.id!==id);persist('courses',courses);render();}
function submitRequest(){const d=getForm();requests.push({...d,id:Date.now(),status:'Pending',submitted:new Date().toISOString().slice(0,10),approver:''});persist('requests',requests);closeModal();render();}
function submitReview(){const d=getForm();requests=requests.map(r=>r.id===editId?{...r,status:d.status,approver:d.approver,comments:r.comments||[]}:r);persist('requests',requests);closeModal();render();}
function deleteRequest(id){if(!confirm('Delete this request?'))return;requests=requests.filter(r=>r.id!==id);persist('requests',requests);render();}
function submitBudget(){const d=getForm();budget={projected:parseInt(d.projected)||0,expected:parseInt(d.expected)||0};persist('budget',budget);closeModal();render();}

render();
window.addEventListener("load", () => { updateSyncUI(); silentReconnect(); });
