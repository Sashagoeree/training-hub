<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Training Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
 --bg:#f4f6f9;
 --surface:#ffffff;
 --surface-2:#f8f9fb;
 --border:#e4e7ec;
 --border-strong:#d0d5dd;
 --text-primary:#0d1117;
 --text-secondary:#5a6478;
 --text-muted:#9aa3b4;
 --accent:#1a56db;
 --accent-hover:#1447c0;
 --accent-light:#eef3fd;
 --success:#0a7c42;
 --success-light:#e6f4ee;
 --danger:#c0392b;
 --danger-light:#fcecea;
 --warning:#b45309;
 --warning-light:#fef6e4;
 --purple:#5c35d4;
 --purple-light:#f0ecfd;
 --sidebar-bg:#0d1117;
 --sidebar-border:#1e2530;
 --sidebar-text:#8b95a7;
 --sidebar-active:#1a56db;
 --radius:8px;
 --radius-lg:12px;
 --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
 --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
 --shadow-lg:0 20px 48px rgba(0,0,0,.14),0 8px 16px rgba(0,0,0,.06);
}
body{font-family:'Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
.layout{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:232px;background:var(--sidebar-bg);display:flex;flex-direction:column;padding:0;position:sticky;top:0;height:100vh;flex-shrink:0;overflow-y:auto}
.brand{padding:20px 18px 16px;border-bottom:1px solid var(--sidebar-border)}
.brand h1{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.3px;line-height:1.2}
.brand p{font-size:11px;color:var(--sidebar-text);margin-top:3px;letter-spacing:.2px}
.nav-section{font-size:10px;font-weight:700;color:#3d4a5c;text-transform:uppercase;letter-spacing:1.2px;padding:18px 18px 6px;font-family:'JetBrains Mono','Courier New',monospace}
.nav-btn{display:flex;align-items:center;gap:9px;padding:8px 18px;border:none;cursor:pointer;background:transparent;color:var(--sidebar-text);font-weight:500;font-size:13px;text-align:left;width:100%;font-family:'Inter',sans-serif;transition:all .12s;position:relative}
.nav-btn:hover{color:#e2e8f0;background:rgba(255,255,255,.04)}
.nav-btn.active{color:#fff;background:rgba(26,86,219,.15)}
.nav-btn.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);height:60%;width:2px;background:var(--accent);border-radius:0 2px 2px 0}
.nav-icon{font-size:11px;width:16px;text-align:center;flex-shrink:0;opacity:.6;font-family:serif}
.nav-btn.active .nav-icon{opacity:1}
.badge-red{margin-left:auto;background:#e53e3e;color:#fff;border-radius:20px;font-size:9px;padding:1px 6px;font-weight:700;font-family:'JetBrains Mono','Courier New',monospace}
.sidebar-footer{margin-top:auto;padding:14px 18px;border-top:1px solid var(--sidebar-border);font-size:10px;color:#3d4a5c;line-height:1.6}

/* ── MAIN ── */
.main{flex:1;padding:28px 32px;overflow-y:auto;min-width:0;height:100vh}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:800;color:var(--text-primary);letter-spacing:-.3px}
.page-sub{font-size:12px;color:var(--text-muted);margin-top:4px;font-weight:500}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-input{border:1.5px solid var(--border);border-radius:var(--radius);padding:7px 12px;font-size:13px;outline:none;width:200px;background:var(--surface);font-family:inherit;color:var(--text-primary);transition:border-color .15s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text-muted)}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:8px 16px;font-weight:600;cursor:pointer;font-size:13px;font-family:inherit;white-space:nowrap;transition:background .15s;letter-spacing:.1px}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--surface);color:var(--text-secondary);border:1.5px solid var(--border);border-radius:var(--radius);padding:7px 13px;font-weight:600;cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s}
.btn-secondary:hover{background:var(--surface-2);border-color:var(--border-strong)}

/* ── STAT CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border-radius:var(--radius-lg);padding:12px 14px;border:1px solid var(--border);display:flex;gap:10px;align-items:center;box-shadow:var(--shadow);overflow:hidden;min-width:0}
.stat-icon{border-radius:var(--radius);width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;font-weight:700}
.stat-value{font-size:clamp(14px,2vw,20px);font-weight:800;line-height:1;letter-spacing:-.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.stat-sub{font-size:10px;font-weight:600;margin-top:3px}

/* ── BUDGET ── */
.budget-card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:18px 20px;margin-bottom:18px;box-shadow:var(--shadow)}
.budget-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.budget-item{text-align:center;padding:13px;border-radius:var(--radius)}
.budget-val{font-size:22px;font-weight:800;line-height:1;letter-spacing:-.5px}
.budget-lbl{font-size:11px;color:var(--text-muted);margin-top:3px;font-weight:500}
.budget-bar-wrap{background:var(--border);border-radius:8px;height:4px;margin-top:12px;overflow:hidden}
.budget-bar{height:100%;border-radius:8px}
.badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.badge-dot{width:5px;height:5px;border-radius:50%;display:inline-block;flex-shrink:0}
.progress-wrap{background:var(--border);border-radius:8px;height:5px;width:100%;overflow:hidden}
.progress-bar{height:100%;border-radius:8px}

/* ── TABLES ── */
.table-wrap{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--surface-2);border-bottom:1.5px solid var(--border)}
th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;font-family:'JetBrains Mono','Courier New',monospace}
td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px;color:var(--text-primary)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface-2)}
.btn-sm{border:none;border-radius:5px;padding:4px 9px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;white-space:nowrap;transition:opacity .15s}
.btn-sm:hover{opacity:.8}
.btn-edit{background:var(--accent-light);color:var(--accent)}
.btn-del{background:var(--danger-light);color:var(--danger)}
.btn-green{background:var(--success-light);color:var(--success)}
.btn-purple{background:var(--purple-light);color:var(--purple)}
.empty{padding:40px;text-align:center;color:var(--text-muted);font-size:13px;font-weight:500}

/* ── COURSE CARDS ── */
.course-card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:16px 18px;display:flex;gap:14px;align-items:flex-start;margin-bottom:10px;box-shadow:var(--shadow);transition:box-shadow .15s}
.course-card:hover{box-shadow:var(--shadow-md)}
.course-main{flex:1;min-width:0}
.course-name-row{display:flex;gap:7px;align-items:center;margin-bottom:3px;flex-wrap:wrap}
.course-name{font-weight:700;font-size:14px;color:var(--text-primary)}

/* ── PARTICIPANT CARDS ── */
.participant-card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);margin-bottom:9px;box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .15s}
.participant-card:hover{box-shadow:var(--shadow-md)}
.participant-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;cursor:default}
.participant-name{font-weight:700;font-size:14px;color:var(--text-primary)}
.participant-meta{font-size:11px;color:var(--text-muted);margin-top:2px;font-weight:500}
.tp-toggle{display:flex;align-items:center;gap:7px;background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--radius);padding:5px 11px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text-secondary);font-family:inherit;transition:all .15s;white-space:nowrap}
.tp-toggle:hover,.tp-toggle.open{background:var(--accent-light);border-color:#bfdbfe;color:var(--accent)}
.tp-chevron{transition:transform .2s;font-size:10px}
.tp-chevron.open{transform:rotate(180deg)}
.training-plan-body{border-top:1px solid var(--border);background:var(--surface-2);overflow:hidden;max-height:0;transition:max-height .3s ease}
.training-plan-body.open{max-height:1200px}
.training-plan-inner{padding:14px 18px}
.tp-item{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:var(--radius);margin-bottom:4px;font-size:12px;font-weight:500}
.tp-done{background:var(--success-light)}
.tp-upcoming{background:var(--accent-light)}
.tp-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;font-family:'JetBrains Mono','Courier New',monospace}

/* ── CALENDAR ── */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.cal-month{font-size:19px;font-weight:800;color:var(--text-primary);letter-spacing:-.3px}
.cal-nav{display:flex;gap:6px}
.cal-nav-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text-secondary);transition:all .15s}
.cal-nav-btn:hover{background:var(--surface-2);border-color:var(--border-strong)}
.cal-grid{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
.cal-day-headers{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface-2);border-bottom:1.5px solid var(--border)}
.cal-day-header{padding:10px 0;text-align:center;font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;font-family:'JetBrains Mono','Courier New',monospace}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day{min-height:100px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:8px;position:relative}
.cal-day:nth-child(7n){border-right:none}
.cal-day.other-month{background:var(--surface-2)}
.cal-day.other-month .cal-date{color:var(--text-muted)}
.cal-day.today{background:var(--accent-light)}
.cal-day.today .cal-date{background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-date{font-size:12px;font-weight:700;color:var(--text-secondary);margin-bottom:5px;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-event{border-radius:4px;padding:2px 6px;margin-bottom:2px;font-size:10px;font-weight:600;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;transition:opacity .15s;letter-spacing:.1px}
.cal-event:hover{opacity:.75}
.cal-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;font-size:12px;color:var(--text-muted);font-weight:500}
.cal-legend-item{display:flex;align-items:center;gap:6px}
.cal-legend-dot{width:9px;height:9px;border-radius:2px}

/* ── ENROL ── */
.enrol-list{border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;max-height:300px;overflow-y:auto}
.enrol-item{display:flex;align-items:center;gap:10px;padding:9px 13px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;font-size:13px}
.enrol-item:last-child{border-bottom:none}
.enrol-item:hover{background:var(--surface-2)}
.enrol-item.selected{background:var(--accent-light)}
.enrol-check{width:16px;height:16px;border-radius:4px;border:2px solid var(--border-strong);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:all .1s}
.enrol-check.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(13,17,23,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.modal-box{background:var(--surface);border-radius:16px;padding:26px;max-width:580px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);border:1px solid var(--border)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:800;color:var(--text-primary);letter-spacing:-.2px}
.modal-close{background:var(--surface-2);border:1px solid var(--border);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:14px;color:var(--text-muted);font-family:inherit;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-close:hover{background:var(--danger-light);color:var(--danger);border-color:#fecaca}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:10px;font-weight:700;color:var(--text-secondary);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;font-family:'JetBrains Mono','Courier New',monospace}
.form-input,.form-select,.form-textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--radius);padding:8px 11px;font-size:13px;outline:none;background:var(--surface);font-family:inherit;color:var(--text-primary);transition:border-color .15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);background:#fff}
.form-textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn-save{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:11px;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit;margin-top:8px;transition:background .15s;letter-spacing:.1px}
.btn-save:hover{background:var(--accent-hover)}

/* ── CHECKLIST ── */
.checklist-builder{border:1.5px solid var(--border);border-radius:var(--radius);padding:12px;background:var(--surface-2);margin-bottom:12px}
.checklist-builder-title{font-size:10px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;font-family:'JetBrains Mono','Courier New',monospace}
.cli-row{display:grid;grid-template-columns:100px 1fr 120px 28px;gap:5px;margin-bottom:5px;align-items:center}
.cli-input{border:1.5px solid var(--border);border-radius:6px;padding:6px 9px;font-size:12px;font-family:inherit;outline:none;background:#fff;width:100%;transition:border-color .15s}
.cli-input:focus{border-color:var(--accent)}
.cli-remove{background:var(--danger-light);color:var(--danger);border:none;border-radius:5px;padding:5px;cursor:pointer;font-family:inherit;width:100%;text-align:center;font-size:12px}
.btn-add-item{background:var(--accent-light);color:var(--accent);border:none;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;margin-top:2px}
.chk-row{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)}
.chk-row:last-child{border-bottom:none}
.chk{width:17px;height:17px;border-radius:4px;border:2px solid var(--border-strong);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700;transition:all .12s}
.chk.done{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── PDF ── */
.pdf-upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;background:var(--surface-2);transition:all .15s}
.pdf-upload-area:hover{border-color:var(--accent);background:var(--accent-light)}
.pdf-preview{background:var(--accent-light);border-radius:var(--radius);padding:9px 12px;display:flex;align-items:center;gap:9px;margin-top:7px;border:1px solid #bfdbfe}
.pdf-preview-name{font-size:12px;font-weight:600;color:var(--accent);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── ALERTS ── */
.alert-banner{background:var(--warning-light);border:1px solid #fcd34d;border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--warning);display:flex;align-items:center;gap:8px;font-weight:500}

/* ── DASH ── */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.dash-card{background:var(--surface);border-radius:var(--radius-lg);padding:18px;border:1px solid var(--border);box-shadow:var(--shadow)}
.dash-card h3{margin:0 0 13px;font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;font-family:'JetBrains Mono','Courier New',monospace}
.app-row{margin-bottom:12px}
.app-row-header{display:flex;justify-content:space-between;margin-bottom:4px;align-items:center;gap:8px}
.req-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.req-row:last-child{border-bottom:none}
.req-badges{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.upcoming-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:9px}
.upcoming-card{border:1px solid var(--border);border-radius:var(--radius);padding:12px;background:var(--surface);transition:box-shadow .15s}
.upcoming-card:hover{box-shadow:var(--shadow-md)}
.span2{grid-column:span 2}
.export-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.export-card{background:var(--surface);border-radius:var(--radius-lg);padding:18px;border:1px solid var(--border);box-shadow:var(--shadow)}
.btn-download{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:9px;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit;transition:background .15s}
.btn-download:hover{background:var(--accent-hover)}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;right:22px;background:var(--text-primary);color:#fff;padding:10px 16px;border-radius:var(--radius);font-weight:600;font-size:13px;z-index:200;box-shadow:var(--shadow-md);opacity:0;transition:opacity .25s;pointer-events:none;letter-spacing:.1px}
.toast.show{opacity:1}
.hidden{display:none}
</style>
</head>
<body>
<div class="layout">
 <div class="sidebar">
 <div class="brand"><h1> Training Hub</h1><p id="save-status"> All data saved</p></div>
 <div class="nav-section">Overview</div>
 <button class="nav-btn active" data-tab="dashboard"><span class="nav-icon">—</span>Dashboard</button>
 <button class="nav-btn" data-tab="calendar"><span class="nav-icon">—</span>Calendar</button>
 <div class="nav-section">People</div>
 <button class="nav-btn" data-tab="participants"><span class="nav-icon">—</span>Participants</button>
 <button class="nav-btn" data-tab="apprentices"><span class="nav-icon">—</span>Apprentices</button>
 <div class="nav-section">Training</div>
 <button class="nav-btn" data-tab="requests"><span class="nav-icon">—</span>Requests</button>
 <button class="nav-btn" data-tab="bookings"><span class="nav-icon">—</span>Training to be Booked</button>
 <button class="nav-btn" data-tab="courses"><span class="nav-icon">—</span>Upcoming Courses</button>
 <button class="nav-btn" data-tab="completed"><span class="nav-icon">—</span>Completed Courses</button>
 <div class="nav-section">Data</div>
 <button class="nav-btn" data-tab="claims"><span class="nav-icon">—</span>Claims Tracker</button>
 <button class="nav-btn" data-tab="export"><span class="nav-icon">—</span>Export / Power BI</button>
 <div class="sidebar-footer" id="sidebar-footer">Data saves automatically<br>to your browser</div>
 <div style="padding:8px 4px 4px" id="sync-btn"></div>
 </div>
 <div class="main" id="main"></div>
</div>

<div class="modal-overlay hidden" id="modal" onclick="handleOverlayClick(event)">
 <div class="modal-box" onclick="event.stopPropagation()">
 <div class="modal-header"><div class="modal-title" id="modal-title"></div><button class="modal-close" onclick="closeModal()">✕</button></div>
 <div id="modal-body"></div>
 </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── DEFAULTS ──────────────────────────────────────────────────────────────────

const GD_CLIENT_ID = '800892219023-gu9gnl132lf1gmdbudlbo9u3i5bmnp24.apps.googleusercontent.com';
const GD_SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
const DATA_FILENAME = 'TrainingHub_Data.json';

let gdToken = null, gdConnected = false, gdFileId = null, _tokenClient = null;

function getTokenClient() {
 if (_tokenClient) return _tokenClient;
 _tokenClient = google.accounts.oauth2.initTokenClient({
 client_id: GD_CLIENT_ID,
 scope: GD_SCOPE,
 callback: async (resp) => {
 if (resp.error) { showToast('Google sign-in failed'); return; }
 gdToken = resp.access_token; gdConnected = true;
 localStorage.setItem('th5_gd_connected','1');
 await loadFromGoogleDrive();
 updateSyncUI(); render();
 }
 });
 return _tokenClient;
}

async function connectGoogleDrive() {
 if (!window.google) { showToast('Loading Google — try again in a moment'); return; }
 getTokenClient().requestAccessToken();
}

function disconnectGoogleDrive() {
 if (gdToken) google.accounts.oauth2.revoke(gdToken, ()=>{});
 gdToken=null; gdConnected=false; gdFileId=null;
 localStorage.removeItem('th5_gd_connected'); localStorage.removeItem('th5_gd_fileid');
 updateSyncUI(); render(); showToast('Disconnected from Google Drive');
}

async function silentReconnect(attempt) {
 attempt=attempt||0;
 if (!localStorage.getItem('th5_gd_connected')) return;
 if (!window.google) { if(attempt<8)setTimeout(()=>silentReconnect(attempt+1),800); return; }
 window._silentReconnect = true;
 try { getTokenClient().requestAccessToken({ prompt:'' }); } catch(e) { window._silentReconnect = false; }
}

async function loadFromGoogleDrive() {
 if (!gdToken) return;
 const silent = window._silentReconnect;
 window._silentReconnect = false;
 if (!silent) setSaveStatus('Syncing with Google Drive…');
 try {
 let fileId = gdFileId || localStorage.getItem('th5_gd_fileid');
 if (!fileId) {
 const list = await gdFetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D'${DATA_FILENAME}'&fields=files(id)`);
 fileId = list.files?.[0]?.id || null;
 }
 if (!fileId) { await saveToGoogleDrive(); return; }
 gdFileId = fileId; localStorage.setItem('th5_gd_fileid', fileId);
 const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers:{ Authorization:`Bearer ${gdToken}` } });
 if (!res.ok) throw new Error('fetch failed');
 const data = await res.json();
 if (data.participants) participants = data.participants;
 if (data.apprentices) apprentices = data.apprentices;
 if (data.courses) courses = data.courses;
 if (data.requests) requests = data.requests;
 if (data.budget) budget = data.budget;
 if (data.claims) claims = data.claims;
 if (data.claimTypes) claimTypes = data.claimTypes;
 if (data.bookings) bookings = data.bookings;
 ['participants','apprentices','courses','requests','budget','claims','claimTypes','bookings'].forEach(k=>localStorage.setItem('th5_'+k,JSON.stringify(eval(k))));
 if(!silent){setSaveStatus(' Synced with Google Drive');showToast(' Loaded from Google Drive');}else{setSaveStatus(' All data saved');}
 } catch(e) { setSaveStatus(' All data saved'); }
}

async function saveToGoogleDrive() {
 if (!gdToken) return;
 setSaveStatus('Saving to Google Drive…');
 const body = JSON.stringify({ participants, apprentices, courses, requests, budget, claims, claimTypes, departments, bookings });
 try {
 if (gdFileId) {
 await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gdFileId}?uploadType=media`, { method:'PATCH', headers:{ Authorization:`Bearer ${gdToken}`,'Content-Type':'application/json' }, body });
 } else {
 const meta = await gdFetch('https://www.googleapis.com/drive/v3/files?fields=id', { method:'POST', body:JSON.stringify({ name:DATA_FILENAME, parents:['appDataFolder'] }) });
 gdFileId = meta.id; localStorage.setItem('th5_gd_fileid', gdFileId);
 await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gdFileId}?uploadType=media`, { method:'PATCH', headers:{ Authorization:`Bearer ${gdToken}`,'Content-Type':'application/json' }, body });
 }
 setSaveStatus('Saved to Google Drive');
 } catch(e) { setSaveStatus('Save failed — saved locally'); }
}

async function gdFetch(url, opts={}) {
 const res = await fetch(url, { ...opts, headers:{ Authorization:`Bearer ${gdToken}`,'Content-Type':'application/json',...(opts.headers||{}) } });
 return res.json();
}

const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAY_NAMES=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function renderCalendar(){window._calEvents=[];
 const today=new Date();
 const firstDay=new Date(calYear,calMonth,1);
 const lastDay=new Date(calYear,calMonth+1,0);
 // Get Monday-based start
 let startDow=firstDay.getDay();
 startDow=startDow===0?6:startDow-1;
 const events=getCalEvents();

 function eventsForDate(y,m,d){
 const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
 return events.filter(e=>e.date===dateStr);
 }

 const days=[];
 // Prev month padding
 for(let i=startDow-1;i>=0;i--){
 const d=new Date(calYear,calMonth,1-i-1);
 days.push({date:d,current:false});
 }
 // Current month
 for(let d=1;d<=lastDay.getDate();d++){
 days.push({date:new Date(calYear,calMonth,d),current:true});
 }
 // Next month padding
 const remaining=7-days.length%7;
 if(remaining<7){for(let d=1;d<=remaining;d++){days.push({date:new Date(calYear,calMonth+1,d),current:false});}}

 const cells=days.map(({date,current})=>{
 const y=date.getFullYear(),m=date.getMonth(),d=date.getDate();
 const isToday=y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate();
 const dayEvents=eventsForDate(y,m,d);
 const evHtml=dayEvents.slice(0,3).map(e=>{
   if(!window._calEvents)window._calEvents=[];
   const idx=window._calEvents.length;window._calEvents.push(e);
   return `<div class="cal-event" style="background:${e.color.bg};color:${e.color.text};border-left:3px solid ${e.color.border};cursor:pointer" title="${e.label}${e.sub?' — '+e.sub:''}" onclick="openModal('cal-event',window._calEvents[${idx}])">${e.label}</div>`;
 }).join('');
 const more=dayEvents.length>3?`<div style="font-size:10px;color:#6b7280;padding:1px 4px">+${dayEvents.length-3} more</div>`:'';
 return `<div class="cal-day${!current?' other-month':''}${isToday?' today':''}">
 <div class="cal-date">${d}</div>
 ${evHtml}${more}
 </div>`;
 }).join('');

 return `
 <div class="cal-header">
 <div class="cal-month">${MONTH_NAMES[calMonth]} ${calYear}</div>
 <div class="cal-nav">
 <button class="cal-nav-btn" onclick="calPrev()">← Prev</button>
 <button class="cal-nav-btn" onclick="calToday()">Today</button>
 <button class="cal-nav-btn" onclick="calNext()">Next →</button>
 </div>
 </div>
 <div class="cal-grid">
 <div class="cal-day-headers">${DAY_NAMES.map(d=>`<div class="cal-day-header">${d}</div>`).join('')}</div>
 <div class="cal-days">${cells}</div>
 </div>
 <div class="cal-legend">
 <span style="font-weight:600;color:#374151">Legend:</span>
 <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#dbeafe;border:2px solid #93c5fd"></div>Short Courses</div>
 <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#fef9c3;border:2px solid #fde68a"></div>Apprentice Units</div>
 </div>`;
}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}render();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}render();}
function calToday(){calYear=new Date().getFullYear();calMonth=new Date().getMonth();render();}

function sendReminderEmail(courseId){
 const c=courses.find(x=>x.id===courseId);if(!c)return;
 const emails=(c.participantIds||[]).map(id=>{const p=participants.find(x=>x.id===id);return p&&p.email?p.email:null;}).filter(Boolean);
 const subject=encodeURIComponent(`Training Reminder: ${c.name} — ${c.date}`);
 const notesLine=c.courseNotes?`\n\nImportant Information:\n${c.courseNotes}`:'';
 const body=encodeURIComponent(`Hi,\n\nThis is a friendly reminder that you are booked in for the following training:\n\nCourse: ${c.name}\nProvider: ${c.provider}\nDate: ${c.date}${notesLine}\n\nPlease confirm your attendance and let us know if you have any questions.\n\nKind regards,\nTraining Team`);
 if(!emails.length){showToast('No email addresses on enrolled participants');return;}
 window.location.href=`mailto:${emails.join(';')}?subject=${subject}&body=${body}`;
 showToast('Opening email client');
}

function exportCSV(data,filename){if(!data.length)return;const keys=Object.keys(data[0]);const csv=[keys.join(','),...data.map(row=>keys.map(k=>`"${String(row[k]??'').replace(/"/g,'""')}"`).join(','))].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=filename;a.click();}

function sendCourseEmail(courseId){
 const c=courses.find(x=>x.id===courseId);if(!c)return;

 const subject=encodeURIComponent(`Training Confirmation: ${c.name} — ${c.date}`);

function handleOverlayClick(e){if(e.target===document.getElementById('modal'))closeModal();}
function closeModal(){
  document.getElementById('modal').classList.add('hidden');
  editId=null;modalMode=null;
  window._tempPdf=null;window._tempPdfName=null;
  window._claimPdf=null;window._claimPdfName=null;
  window._claimSoa=null;window._claimSoaName=null;
  window._claimDisplayId=null;window._claimNotes=null;window._claimData=null;
  if(window._appDraftTimer){clearInterval(window._appDraftTimer);window._appDraftTimer=null;}
}

function getForm(){const d={};document.querySelectorAll('#modal-body input,#modal-body select,#modal-body textarea').forEach(i=>{if(i.name)d[i.name]=i.value;});return d;}
function addUnit(){const w=document.getElementById('cli-wrap');const d=document.createElement('div');d.className='cli-row';d.innerHTML=`<input class="cli-input" placeholder="e.g. CPCCWHS1001"/><input class="cli-input" placeholder="Unit name"/><input class="cli-input" type="date"/><button class="cli-remove" onclick="this.parentElement.remove()">✕</button>`;w.appendChild(d);}
function getUnits(){return Array.from(document.querySelectorAll('#cli-wrap .cli-row')).map(row=>{const ins=row.querySelectorAll('input');const code=(ins[0]?.value||'').trim();const name=(ins[1]?.value||'').trim();return name?{code,name,date:ins[2]?.value||'',done:false}:null;}).filter(Boolean);}
function toggleCourse(aid,idx){const a=apprentices.find(x=>x.id===aid);if(!a||!a.courses)return;a.courses[idx].done=!a.courses[idx].done;persist('apprentices',apprentices);openModal('view-apprentice',aid);}
function handlePdfUpload(event){const file=event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{window._tempPdf=e.target.result;window._tempPdfName=file.name;document.getElementById('pdf-drop').style.display='none';const prev=document.createElement('div');prev.className='pdf-preview';prev.innerHTML=`<span>PDF</span><span class="pdf-preview-name">${file.name}</span><button class="btn-sm btn-del" onclick="removePdf()">Remove</button>`;document.getElementById('pdf-drop').parentNode.insertBefore(prev,document.getElementById('pdf-drop'));};reader.readAsDataURL(file);}
function removePdf(){window._tempPdf=null;window._tempPdfName=null;const prev=document.querySelector('.pdf-preview');if(prev)prev.remove();document.getElementById('pdf-drop').style.display='';}
function toggleEnrol(pid,cid){const c=courses.find(x=>x.id===cid);if(!c)return;if(!c.participantIds)c.participantIds=[];const idx=c.participantIds.indexOf(pid);if(idx>=0)c.participantIds.splice(idx,1);else c.participantIds.push(pid);const isOn=c.participantIds.includes(pid);document.getElementById('enrol-'+pid)?.classList.toggle('selected',isOn);const chk=document.getElementById('echk-'+pid);if(chk){chk.classList.toggle('on',isOn);chk.textContent=isOn?'✓':'';}}
function saveEnrolment(cid){const c=courses.find(x=>x.id===cid);if(!c)return;c.enrolled=(c.participantIds||[]).length;persist('courses',courses);closeModal();render();}
function addParticipantFromEnrol(cid){window._returnToEnrol=cid;openModal('add-participant');}
function submitParticipant(){const d=getForm();d.active=d.active!=='false';if(modalMode==='add-participant')participants.push({...d,id:Date.now()});else participants=participants.map(p=>p.id===editId?{...p,...d}:p);persist('participants',participants);const returnCid=window._returnToEnrol;window._returnToEnrol=null;closeModal();if(returnCid){render();openModal('enrol-course',returnCid);}else{render();}}
function deleteParticipant(id){
  const p=participants.find(x=>x.id===id);
  const openClaims=claims.filter(cl=>cl.participantName===p?.name&&cl.status!=='Closed').length;
  const msg='Delete '+( p?.name||'this person')+'?'+(openClaims>0?' They have '+openClaims+' open claim(s) that will become orphaned.':'');
  if(!confirm(msg))return;
  participants=participants.filter(x=>x.id!==id);
  courses=courses.map(c=>({...c,participantIds:(c.participantIds||[]).filter(pid=>pid!==id)}));
  persist('participants',participants);persist('courses',courses);render();
}
function submitApprentice(){const d=getForm(),units=getUnits();if(modalMode==='add-apprentice'){apprentices.push({...d,id:Date.now(),courses:units});}else{apprentices=apprentices.map(a=>{if(a.id!==editId)return a;const ex=a.courses||[];return{...a,...d,courses:units.map(u=>{const e=ex.find(c=>c.name===u.name);return e?{...e,code:u.code,date:u.date}:u;})};});}persist('apprentices',apprentices);closeModal();render();}
function deleteApprentice(id){if(!confirm('Delete this apprentice?'))return;apprentices=apprentices.filter(a=>a.id!==id);persist('apprentices',apprentices);render();}
function submitCourse(){const d=getForm();d.seats=parseInt(d.seats)||0;d.cost=parseInt(d.cost)||0;if(modalMode==='add-course'){d.participantIds=[];d.enrolled=0;d.certificates={};d.dnaMap={};d.invoiceNo='';d.invoiceNotes='';d.invoicePdf=null;d.invoicePdfName=null;d.soaPdf=null;d.soaPdfName=null;courses.push({...d,id:Date.now()});}else{courses=courses.map(c=>c.id!==editId?c:{...c,...d,invoicePdf:c.invoicePdf,invoicePdfName:c.invoicePdfName,soaPdf:c.soaPdf,soaPdfName:c.soaPdfName,certificates:c.certificates||{},dnaMap:c.dnaMap||{}});}persist('courses',courses);closeModal();render();}
function deleteCourse(id){
  const co=courses.find(x=>x.id===id);
  const relClaims=claims.filter(cl=>cl.invoiceNo&&co?.invoiceNo&&cl.invoiceNo===co.invoiceNo&&cl.status!=='Closed').length;
  const msg='Delete '+(co?.name||'this course')+'?'+(relClaims>0?' There are '+relClaims+' claim(s) referencing this course invoice number.':'');
  if(!confirm(msg))return;
  courses=courses.filter(c=>c.id!==id);
  persist('courses',courses);render();
}
function submitRequest(){const d=getForm();if(d.department==='__other__')d.department=d.departmentOther||'';delete d.departmentOther;requests.push({...d,id:Date.now(),status:'Pending',submitted:new Date().toISOString().slice(0,10),approver:''});persist('requests',requests);closeModal();render();}
function submitReview(){
  const d=getForm();
  const prevReq=requests.find(r=>r.id===editId);
  const wasApproved=prevReq&&prevReq.status==='Approved';
  requests=requests.map(r=>r.id===editId?{...r,status:d.status,approver:d.approver,comments:r.comments||[]}:r);
  persist('requests',requests);
  // Auto-create booking when status flips to Approved
  if(d.status==='Approved'&&!wasApproved){
    const r=requests.find(x=>x.id===editId);
    if(r&&!bookings.find(b=>b.requestId===r.id)){
      bookings.push({id:Date.now(),requestId:r.id,employee:r.employee,department:r.department||'',course:r.course,reason:r.reason||'',priority:r.priority||'Medium',participants:r.participants||[],provider:'',date:'',cost:'',seats:'',notes:'',status:'To Be Booked',approver:d.approver||r.approver||'',created:new Date().toLocaleDateString('en-AU')});
      persist('bookings',bookings);
      showToast('Booking record created in Training to be Booked');
    }
  }
  closeModal();render();
}
function deleteRequest(id){if(!confirm('Delete this request?'))return;requests=requests.filter(r=>r.id!==id);persist('requests',requests);render();}
function addComment(requestId){const text=document.getElementById('new-req-comment')?.value?.trim();if(!text)return;const r=requests.find(x=>x.id===requestId);if(!r)return;if(!r.comments)r.comments=[];r.comments.push({text,author:'Admin',date:new Date().toLocaleDateString('en-AU')});persist('requests',requests);openModal('review-request',requestId);}
function submitBudget(){const d=getForm();budget.projected=parseFloat(d.projected)||0;budget.expected=parseFloat(d.expected)||0;persist('budget',budget);closeModal();render();}
function handleCertUpload(event,courseId,participantId){const file=event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{const c=courses.find(x=>x.id===courseId);if(!c)return;if(!c.certificates)c.certificates={};c.certificates[participantId]={name:file.name,data:e.target.result};persist('courses',courses);openModal('manage-certs',courseId);};reader.readAsDataURL(file);}
function removeCert(courseId,participantId){const c=courses.find(x=>x.id===courseId);if(!c||!c.certificates)return;delete c.certificates[participantId];persist('courses',courses);openModal('manage-certs',courseId);}

        <div style="background:var(--surface-2);border-radius:7px;padding:10px;margin-bottom:8px">

        </div>
      </div>
    </div>`

      <div style="font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.3px;margin-bottom:10px">Resubmission Details</div>

        <div class="form-group"><label class="form-label">Accepted Amount ($)</label>
          <input class="form-input" name="acceptedAmount" id="accepted-amt" type="number" value="${ed.acceptedAmount||''}" placeholder="0" oninput="calcCostToBusiness(${amt})">

function calcCostToBusiness(claimAmtFallback){const claimAmt=parseFloat(document.querySelector('[name="claimAmount"]')?.value||0)||parseFloat(claimAmtFallback||0);const acceptedAmt=parseFloat(document.getElementById('accepted-amt')?.value||0);const costField=document.getElementById('cost-business');if(costField)costField.value=Math.max(0,claimAmt-acceptedAmt).toFixed(2);}

function addDepartment(){const v=document.getElementById('new-dept-input')?.value?.trim();if(!v)return;if(!departments.includes(v)){departments.push(v);persist('departments',departments);}document.getElementById('dept-list').innerHTML=(departments||[]).sort().map((d,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)"><span style="flex:1;font-size:13px;font-weight:500">${d}</span><button class="btn-sm btn-del" onclick="removeDepartment(${i})">Remove</button></div>`).join('');document.getElementById('new-dept-input').value='';}
function removeDepartment(i){const sorted=[...departments].sort();const val=sorted[i];departments=departments.filter(d=>d!==val);persist('departments',departments);document.getElementById('dept-list').innerHTML=(departments||[]).sort().map((d,j)=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)"><span style="flex:1;font-size:13px;font-weight:500">${d}</span><button class="btn-sm btn-del" onclick="removeDepartment(${j})">Remove</button></div>`).join('');}

function submitClaim(){
  const maxNum=claims.reduce((mx,c)=>{const n=parseInt((c.internalClaimId||'').replace('CLM-',''))||0;return Math.max(mx,n)},0);
  const displayId=window._claimDisplayId||'CLM-'+String(maxNum+1).padStart(4,'0');
  const d=getForm();
  const costBusinessEl=document.getElementById('cost-business');
  if(costBusinessEl&&costBusinessEl.value)d.costIncurred=costBusinessEl.value;
  d.invoicePdf=window._claimPdf;d.invoicePdfName=window._claimPdfName;
  d.soaPdf=window._claimSoa;d.soaPdfName=window._claimSoaName;
  const today=new Date().toLocaleDateString('en-AU');
  const newNotes=window._claimNotes||[];
  const nextAction=d.nextAction||'';
  if(d.status==='Approved'){
    const acceptedEl=document.getElementById('accepted-amt');
    if(!d.acceptedAmount&&(!acceptedEl||!acceptedEl.value)){showToast('Accepted Amount is required');return;}
    const claimed=parseFloat(d.claimAmount||0);
    const accepted=parseFloat(d.acceptedAmount||0);
    d.costIncurred=parseFloat((claimed-accepted).toFixed(2));
    d.status='Closed';d.closedType='approved';d.closedDate=today;
    newNotes.push({text:`Approved. Accepted: $${accepted.toLocaleString()}. Cost to business: $${d.costIncurred.toLocaleString()}`,author:'System',date:today,status:'Closed'});
  }
  if(d.status==='Rejected'&&!nextAction){showToast('Select Next Steps: Resubmit or Write Off');return;}
  if(d.status==='Rejected'&&nextAction==='Resubmit'){
    d.status='Resubmitted';d.resubmittedDate=today;d.costIncurred=0;
    newNotes.push({text:`Resubmitted after rejection. Rejection reason: ${d.rejectionReason||'Not specified'}`,author:'System',date:today,status:'Resubmitted'});
  }
  if(d.status==='Rejected'&&nextAction==='Write Off'){
    d.status='Closed';d.closedType='rejected';d.closedDate=today;
    d.costIncurred=parseFloat(d.claimAmount||0);d.acceptedAmount=0;
    newNotes.push({text:`Written off. Full claim ($${parseFloat(d.claimAmount||0).toLocaleString()}) = cost to business.`,author:'System',date:today,status:'Closed'});
  }
  if(d.status==='Resubmitted')d.lastUpdated=today;
  if(modalMode==='add-claim'){
    claims.push({...d,id:Date.now(),internalClaimId:displayId,notes:newNotes,createdDate:today});
  }else{
    const existing=claims.find(c=>c.id===editId)||{};
    const mergedNotes=[...(existing.notes||[]),...newNotes];
    claims=claims.map(c=>c.id!==editId?c:{...existing,...d,internalClaimId:c.internalClaimId,createdDate:c.createdDate,closedDate:d.closedDate||c.closedDate,closedType:d.closedType||c.closedType,invoicePdf:window._claimPdf,invoicePdfName:window._claimPdfName,soaPdf:window._claimSoa,soaPdfName:window._claimSoaName,notes:mergedNotes});
  }
  window._claimNotes=null;window._pendingStatus=null;
  persist('claims',claims);closeModal();render();
}

function createClaimFromCourse(courseId){
  const co=courses.find(x=>x.id===courseId);if(!co)return;
  const maxNum=claims.reduce((mx,cl)=>{const n=parseInt((cl.internalClaimId||'').replace('CLM-',''))||0;return Math.max(mx,n)},0);
  const newId='CLM-'+String(maxNum+1).padStart(4,'0');
  const pNames=getPNames(co.participantIds);
  const firstP=co.participantIds&&co.participantIds.length===1?getPName(co.participantIds[0]):'';
  // If multiple participants, leave participantName blank but list all in notes
  const multiNote=co.participantIds&&co.participantIds.length>1?` Enrolled participants: ${pNames}.`:'';
  const newClaim={id:Date.now(),internalClaimId:newId,title:co.name,claimType:'',ctfClaimId:'',participantName:firstP,invoiceNo:co.invoiceNo||'',createdOn:new Date().toISOString().slice(0,10),claimAmount:'',acceptedAmount:'',costIncurred:'',status:'Pending',notes:[{text:`Pre-filled from course: ${co.name}. Provider: ${co.provider}. Date: ${formatDate(co.date)}.${multiNote||' Participant: '+(pNames||'None')+'.'} Select or confirm the participant above before submitting.`,author:'System',date:new Date().toLocaleDateString('en-AU'),status:'Pending'}],invoicePdf:co.invoicePdf||null,invoicePdfName:co.invoicePdfName||null,soaPdf:co.soaPdf||null,soaPdfName:co.soaPdfName||null,createdDate:new Date().toLocaleDateString('en-AU')};
  claims.push(newClaim);
  persist('claims',claims);
  showToast('Claim created — go to Claims Tracker to complete');
  // navigate to claims tab
  currentTab='claims';
  document.querySelectorAll('.nav-btn').forEach(b=>{b.classList.toggle('active',b.dataset.tab==='claims');});
  render();
  // open the new claim immediately
  setTimeout(()=>openModal('edit-claim',newClaim.id),200);
}

function convertBookingToCourse(id){
  const bk=bookings.find(b=>b.id===id);if(!bk)return;
  if(bk.status==='Converted'){showToast('Already converted to a course');return;}
  const participantIds=[];
  (bk.participants||[]).forEach(pid=>{const p=participants.find(x=>x.id===pid);if(p)participantIds.push(p.id);});
  const newCourse={id:Date.now(),name:bk.course,provider:bk.provider||'',date:bk.date||'',seats:bk.seats||10,enrolled:participantIds.length,cost:bk.cost||0,status:'Scheduled',participantIds,invoiceNo:'',invoiceNotes:'',invoicePdf:null,invoicePdfName:null,soaPdf:null,soaPdfName:null,certificates:{},dnaMap:{},courseNotes:bk.notes||''};
  courses.push(newCourse);
  bookings=bookings.map(b=>b.id===id?{...b,status:'Converted',courseId:newCourse.id}:b);
  persist('courses',courses);persist('bookings',bookings);
  showToast('Course created in Upcoming Courses');render();
}

    return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);border-left:3px solid #fde68a;padding-left:8px">'
      +'<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+u.name+'</div>'
      +'<div style="font-size:11px;color:#854d0e">'+u.apprentice+' &middot; '+formatDate(u.date)+'</div></div>'
      +'<div style="text-align:right;flex-shrink:0"><span style="font-size:10px;background:#fef9c3;color:#854d0e;border-radius:10px;padding:2px 7px;font-weight:700">Unit</span></div></div>';
  }).join('');
  return '<div style="max-height:280px;overflow-y:auto;margin-top:4px">'+scHtml+auHtml+'</div>';
}

updateSyncUI();
render();
silentReconnect(0);
</script>
